{% extends 'base.html' %}

{% block title %}Dashboard 01{% endblock %}

{% block content %}

<div class="container-fluid py-5">

    <div class="text-center mb-4">
        <h1 class="fw-bold text-danger">
            HEART DISEASE ANALYSIS Dashboard 01
        </h1>
        <p class="text-muted">
            Interactive visualization of Heart Disease Analysis
        </p>
    </div>

    <div class="card shadow-lg border-0 rounded-4">
        <div class="card-body p-3">

            <div class="tableau-container">
                <div class='tableauPlaceholder' id='viz1781346546370' style='width:100%; height:900px;'>

                    <noscript>
                        <a href='#'>
                            <img alt='Dashboard01'
                                src='https://public.tableau.com/static/images/HE/HEARTDISEASEANALYSISUSINGTABLAUE-DASHBOARD01/Dashboard01/1_rss.png'
                                style='border: none; width:100%;'>
                        </a>
                    </noscript>

                    <object class='tableauViz' style='display:none;'>

                        <param name='host_url' value='https%3A%2F%2Fpublic.tableau.com%2F' />

                        <param name='embed_code_version' value='3' />

                        <param name='site_root' value='' />

                        <param name='name'
                            value='HEARTDISEASEANALYSISUSINGTABLAUE-DASHBOARD01/Dashboard01' />

                        <param name='tabs' value='no' />

                        <param name='toolbar' value='yes' />

                        <param name='animate_transition' value='yes' />

                        <param name='display_static_image' value='yes' />

                        <param name='display_spinner' value='yes' />

                        <param name='display_overlay' value='yes' />

                        <param name='display_count' value='yes' />

                        <param name='language' value='en-US' />

                        <param name='filter' value='publish=yes' />

                    </object>
                </div>
            </div>

        </div>
    </div>

</div>

<script type='text/javascript'>
    var divElement = document.getElementById('viz1781346546370');
    var vizElement = divElement.getElementsByTagName('object')[0];

    // Make dashboard responsive
    vizElement.style.width = '100%';
    vizElement.style.height = '900px';

    if (window.innerWidth < 768) {
        vizElement.style.height = '700px';
    }

    var scriptElement = document.createElement('script');
    scriptElement.src = 'https://public.tableau.com/javascripts/api/viz_v1.js';
    vizElement.parentNode.insertBefore(scriptElement, vizElement);
</script>

<style>
    .tableau-container {
        width: 100%;
        overflow: hidden;
        border-radius: 15px;
    }

    .tableauPlaceholder {
        width: 100% !important;
    }

    .tableauViz {
        width: 100% !important;
        min-height: 900px;
    }

    @media (max-width: 768px) {
        .tableauViz {
            min-height: 700px;
        }
    }
</style>

{% endblock %}
