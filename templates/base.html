<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Heart Disease Analysis{% endblock %}</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <!-- Font Awesome -->
    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

    <!-- Custom CSS -->
    <link rel="stylesheet"
          href="{{ url_for('static', filename='css/style.css') }}">

    <style>

        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: #f8f9fa;
            padding-top: 80px;
        }

        /* Fixed Navbar */
        .navbar-custom {
            background: linear-gradient(90deg, #dc3545, #ff6b6b);
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
        }

        .navbar-brand {
            font-size: 1.5rem;
            font-weight: 700;
            color: white !important;
        }

        .navbar-nav .nav-link {
            color: white !important;
            font-weight: 500;
            margin-left: 15px;
            transition: all 0.3s ease;
            border-radius: 8px;
            padding: 8px 15px !important;
        }

        .navbar-nav .nav-link:hover {
            background-color: rgba(255, 255, 255, 0.2);
            color: #fff !important;
        }

        .navbar-nav .nav-link.active {
            background-color: white;
            color: #dc3545 !important;
        }

        /* Hero Section */
        .hero-section {
            background: linear-gradient(rgba(220,53,69,0.8),
                        rgba(220,53,69,0.8)),
                        url("https://images.unsplash.com/photo-1576091160399-112ba8d25d1a?w=1600");
            background-size: cover;
            background-position: center;
            min-height: 90vh;
            display: flex;
            align-items: center;
        }

        /* Feature Cards */
        .feature-card {
            border: none;
            border-radius: 20px;
            transition: 0.4s;
        }

        .feature-card:hover {
            transform: translateY(-10px);
        }

        /* Dashboard Cards */
        .dashboard-card {
            border-radius: 20px;
            overflow: hidden;
        }

        /* Footer */
        footer {
            background: #212529;
            color: white;
            padding: 20px 0;
            margin-top: 50px;
        }

    </style>

</head>

<body>

    <!-- Fixed Horizontal Navbar -->
    <nav class="navbar navbar-expand-lg navbar-dark navbar-custom fixed-top">

        <div class="container">

            <a class="navbar-brand"
               href="{{ url_for('home') }}">

                <i class="fas fa-heartbeat"></i>
                Heart Disease Analysis

            </a>

            <button class="navbar-toggler"
                    type="button"
                    data-bs-toggle="collapse"
                    data-bs-target="#navbarNav">

                <span class="navbar-toggler-icon"></span>

            </button>

            <div class="collapse navbar-collapse"
                 id="navbarNav">

                <ul class="navbar-nav ms-auto">

                    <li class="nav-item">
                        <a class="nav-link"
                           href="{{ url_for('home') }}">

                            <i class="fas fa-home"></i>
                            Home

                        </a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link"
                           href="{{ url_for('about') }}">

                            <i class="fas fa-info-circle"></i>
                            About

                        </a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link"
                           href="{{ url_for('dashboard01') }}">

                            <i class="fas fa-chart-line"></i>
                            Dashboard 1

                        </a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link"
                           href="{{ url_for('dashboard02') }}">

                            <i class="fas fa-chart-pie"></i>
                            Dashboard 2

                        </a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link"
                           href="{{ url_for('story') }}">

                            <i class="fas fa-book-open"></i>
                            Story

                        </a>
                    </li>

                </ul>

            </div>

        </div>

    </nav>

    <!-- Main Content -->
    <main>

        {% block content %}
        {% endblock %}

    </main>

    <!-- Footer -->
    <footer>

        <div class="container text-center">

            <h5>
                <i class="fas fa-heartbeat text-danger"></i>
                Heart Disease Analysis
            </h5>

            <p class="mb-0">
                An Interactive Healthcare Analytics Dashboard using Flask,
                Bootstrap, and Data Visualization.
            </p>

            <small>
                © 2026 Heart Disease Analysis Project. All Rights Reserved.
            </small>

        </div>

    </footer>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js">
    </script>

</body>
</html>
